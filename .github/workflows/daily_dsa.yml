name: DSA Practice

on:
  schedule:
    - cron: '0 6 * * *'   # 11:30 AM IST every day
  workflow_dispatch:

jobs:
  daily-dsa:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq

      - name: Configure git
        run: |
          git config --global user.email "msagar111402@gmail.com"
          git config --global user.name "sagar141202"

      - name: Commit 1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_single.py && git push

